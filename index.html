<!DOCTYPE html>
<html>
<head>
  <title>zcore</title>

  <meta charset="UTF-8">

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    @font-face {
      font-family: 'Cozette';
      src: url('extra/site/fonts/CozetteVector.ttf') format('truetype');
    }

    body {
      background-color: #0a0a0a;
      color: #00ff9f;
      font-family: 'Cozette', monospace;
      font-size: 18px;
      margin: 0;
    }

    .container {
      max-width: 700px;
      margin: 80px auto;
      padding: 30px;
      border: 2px solid #00ff9f;
    }

    h1 {
      text-align: center;
      letter-spacing: 2px;
    }

    .subtitle {
      text-align: center;
      opacity: 0.7;
      margin-bottom: 30px;
    }

    .download-btn {
      display: block;
      width: fit-content;
      margin: 20px auto;
      padding: 12px 20px;
      border: 2px solid #00ff9f;
      color: #00ff9f;
      text-decoration: none;
    }

    .download-btn:hover {
      background: #00ff9f;
      color: #0a0a0a;
    }

    #content {
      margin-top: 40px;
    }

    #content h1, 
    #content h2, 
    #content h3 {
      border-bottom: 1px solid #00ff9f;
      padding-bottom: 5px;
      margin-top: 30px;
    }

    #content p {
      line-height: 1.6;
    }

    #content pre {
      background: #111;
      padding: 15px;
      overflow-x: auto;
      border: 1px solid #00ff9f;
    }

    #content code {
      font-family: 'Cozette', monospace;
    }

    #content a {
      color: #00ff9f;
    }

    .footer {
      margin-top: 30px;
      font-size: 14px;
      opacity: 0.5;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>ZCORE</h1>

    <div class="subtitle">
      tiny syscall wrapper for modular projects
    </div>

    <a href="zcore.tar.gz" download class="download-btn">
      download zcore.tar.gz
    </a>

    <a href="https://github.com/chromalence/zcore/tree/main" class="download-btn">
      view zcore
    </a>

    <div id="content">loading README...</div>

    <div class="footer">
      v1.2 • linux • tar.gz
    </div>
  </div>

  <script>
    fetch("README.md")
      .then(res => res.text())
      .then(md => {
        document.getElementById("content").innerHTML = marked.parse(md);
      })
      .catch(() => {
        document.getElementById("content").innerText =
          "failed to load README.md (are you running a local server?)";
      });
  </script>
</body>
</html>
